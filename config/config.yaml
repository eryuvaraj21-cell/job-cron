# Job Auto-Apply Bot Configuration

# Job search settings
search:
  titles:
    - Node.js Developer
    - Backend Developer
  locations:
    - Bangalore
  experience_years: 4
  
# Skills to prioritize (auto-extracted from resume, but you can add more)
extra_skills:
  - JavaScript
  - TypeScript
  - Node.js
  - Angular
  - React
  - Express
  - MongoDB
  - Redis
  - Docker
  - Kubernetes
  - REST API
  - Git
  - JWT
  - Jest
  - CSS

# Matching thresholds
matching:
  min_score: 0           # Apply to anything matched
  min_skills_match: 0    # Don't require skill overlap
  
# Platforms to scrape
platforms:
  linkedin:
    enabled: true
    easy_apply_only: true
    max_applications_per_run: 10
  naukri:
    enabled: true
    max_applications_per_run: 100

# Filters
filters:
  exclude_companies: []
  exclude_titles:
    - intern
    - trainee
  min_salary: 0          # 0 means no minimum
  max_days_posted: 30    # Only apply to jobs posted within last N days
  
# Email notification settings
notifications:
  on_manual_action_needed: true
  on_successful_apply: true
  daily_summary: true
  daily_summary_time: "20:00"

# Browser automation settings  
browser:
  page_load_timeout: 30
  implicit_wait: 10
  max_retries: 3
