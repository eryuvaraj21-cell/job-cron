name: Job Auto-Apply Bot

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:          # Manual trigger

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database
        uses: actions/cache@v4
        with:
          path: data/
          key: jobs-db-${{ github.run_id }}
          restore-keys: jobs-db-

      - name: Create .env
        run: |
          cat <<EOF > .env
          LINKEDIN_EMAIL=${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD=${{ secrets.LINKEDIN_PASSWORD }}
          NAUKRI_EMAIL=${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD=${{ secrets.NAUKRI_PASSWORD }}
          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_EMAIL=${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL=${{ secrets.NOTIFY_EMAIL }}
          RESUME_PATH=resume/resume.pdf
          BROWSER_HEADLESS=true
          CRON_INTERVAL_MINUTES=9999
          EOF

      - name: Run one cycle
        run: python -c "
          from src.main import run_job_cycle, db;
          db.init_db();
          run_job_cycle()
          "
        timeout-minutes: 20
