name: Job Auto-Apply Bot

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:          # Manual trigger

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << 'ENVEOF'
          LINKEDIN_EMAIL=eryuvaraj21@gmail.com
          LINKEDIN_PASSWORD=PSEue1-8xypL1qU
          NAUKRI_EMAIL=eryuvaraj21@gmail.com
          NAUKRI_PASSWORD=jw8jZKhL%y.RJb$
          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_EMAIL=yuva21052000@gmail.com
          SMTP_PASSWORD=fsnu zrrt ycli zjpi
          NOTIFY_EMAIL=eryuvaraj21@gmail.com
          RESUME_PATH=resume/resume.pdf
          BROWSER_HEADLESS=true
          CRON_INTERVAL_MINUTES=9999
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Run one cycle
        run: python src/run_once.py
        timeout-minutes: 20
