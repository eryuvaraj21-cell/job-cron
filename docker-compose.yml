services:
  job-bot:
    build: .
    container_name: job-auto-apply
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./resume:/app/resume
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - BROWSER_HEADLESS=true
      - PYTHONUNBUFFERED=1
    shm_size: '2gb'  # Chrome needs shared memory
